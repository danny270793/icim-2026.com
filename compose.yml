networks:
  network:
    driver: bridge

services:
  web:
    ports:
      - "${WEB_PORT}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          'exit(@file_get_contents("http://127.0.0.1:8080/") === false ? 1 : 0);',
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - network
